name: Publish to PyPI

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      source_sha:
        required: true
        type: string
      build:
        required: false
        type: boolean
        default: true
      publish:
        required: false
        type: boolean
        default: true
    secrets:
      SIMKL_CLIENT_ID:
        required: false
      PYPI_API_TOKEN:
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  
      contents: write  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.source_sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry --version

      - name: Validate project metadata and release version
        if: ${{ inputs.build }}
        run: poetry check
      
      - name: Validate release version
        if: ${{ inputs.build }}
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: python scripts/validate_release_version.py "$RELEASE_VERSION"

      - name: Validate build inputs
        if: ${{ inputs.build }}
        env:
          SIMKL_CLIENT_ID: ${{ secrets.SIMKL_CLIENT_ID }}
        run: |
          if [ -z "$SIMKL_CLIENT_ID" ]; then
            echo "::error::SIMKL_CLIENT_ID secret is not set."
            exit 1
          fi

      - name: Inject public Simkl Client ID
        if: ${{ inputs.build }}
        env:
          SIMKL_CLIENT_ID: ${{ secrets.SIMKL_CLIENT_ID }}
        run: |
          sed -i "s|SIMKL_CLIENT_ID_PLACEHOLDER|${SIMKL_CLIENT_ID}|g" simkl_mps/credentials.py

      - name: Build package
        if: ${{ inputs.build }}
        run: |
          poetry build
          ls -la dist/
        env:
          VERSION: ${{ inputs.version }}

      - name: Upload Python package artifacts
        if: ${{ inputs.build }}
        uses: actions/upload-artifact@v7
        with:
          name: python-package
          path: dist/
          retention-days: 3

      - name: Download previously built package artifacts
        if: ${{ !inputs.build }}
        uses: actions/download-artifact@v8
        with:
          name: python-package
          path: dist/

      - name: Verify existing PyPI release matches this build
        if: ${{ inputs.publish }}
        id: pypi_preflight
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          import urllib.error
          import urllib.request
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"]
          request = urllib.request.Request(
              f"https://pypi.org/pypi/simkl-mps/{version}/json",
              headers={"User-Agent": "simkl-mps-release-verifier/1"},
          )
          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  release = json.load(response)
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
                  output.write("already_exists=false\n")
              raise SystemExit(0)

          local_files = sorted(path for path in Path("dist").iterdir() if path.is_file())
          if not local_files:
              raise SystemExit("No local Python distribution files were found in dist/.")

          remote_hashes = {
              item["filename"]: item.get("digests", {}).get("sha256")
              for item in release.get("urls", [])
          }
          local_names = {path.name for path in local_files}
          remote_names = set(remote_hashes)
          if local_names != remote_names:
              raise SystemExit(
                  "PyPI already contains this version with a different file set: "
                  f"local={sorted(local_names)}, remote={sorted(remote_names)}"
              )

          mismatches = []
          for path in local_files:
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              if digest != remote_hashes.get(path.name):
                  mismatches.append(path.name)
          if mismatches:
              raise SystemExit(
                  "PyPI already contains this version with different file digest(s): "
                  + ", ".join(mismatches)
              )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write("already_exists=true\n")
          print("PyPI already contains byte-identical artifacts; publication is already complete.")
          PY

      - name: Validate publish token
        if: ${{ inputs.publish }}
        env:
          ALREADY_EXISTS: ${{ steps.pypi_preflight.outputs.already_exists }}
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ "$ALREADY_EXISTS" != "true" ] && [ -z "$PYPI_API_TOKEN" ]; then
            echo "::error::PYPI_API_TOKEN secret is not set."
            exit 1
          fi

      - name: Revalidate release tag and source immediately before PyPI publication
        if: ${{ inputs.publish }}
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          TAG_NAME="v$RELEASE_VERSION"
          EXPECTED_REF="refs/tags/$TAG_NAME"
          if [ "$GITHUB_REF" != "$EXPECTED_REF" ]; then
            echo "::error::PyPI publication must run from $EXPECTED_REF, not $GITHUB_REF."
            exit 1
          fi

          git fetch --force origin "refs/tags/$TAG_NAME:refs/tags/$TAG_NAME"
          TAG_SHA=$(git rev-parse "refs/tags/$TAG_NAME^{commit}")
          CHECKED_OUT_SHA=$(git rev-parse HEAD)
          if [ "$TAG_SHA" != "$SOURCE_SHA" ] || [ "$CHECKED_OUT_SHA" != "$SOURCE_SHA" ]; then
            echo "::error::Release tag or checkout changed before PyPI publication."
            exit 1
          fi

      - name: Publish to PyPI
        if: ${{ inputs.publish && steps.pypi_preflight.outputs.already_exists != 'true' }}
        run: poetry publish -vvv
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_API_TOKEN }}
