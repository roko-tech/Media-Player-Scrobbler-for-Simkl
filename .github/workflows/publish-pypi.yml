name: Publish to PyPI

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      build:
        required: false
        type: boolean
        default: true
      publish:
        required: false
        type: boolean
        default: true
    secrets:
      SIMKL_CLIENT_ID:
        required: false
      PYPI_API_TOKEN:
        required: false
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build/publish (e.g., 2.3.1)'
        required: true
        type: string
      publish:
        description: 'PyPI publish'
        required: true
        type: boolean
        default: true
      build:
        description: 'Build the package artifact'
        required: true
        type: boolean
        default: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  
      contents: write  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry --version

      - name: Validate project metadata and release version
        if: ${{ inputs.build }}
        run: poetry check
      
      - name: Validate release version
        if: ${{ inputs.build }}
        run: python scripts/validate_release_version.py ${{ inputs.version }}

      - name: Validate build inputs
        if: ${{ inputs.build }}
        env:
          SIMKL_CLIENT_ID: ${{ secrets.SIMKL_CLIENT_ID }}
        run: |
          if [ -z "$SIMKL_CLIENT_ID" ]; then
            echo "::error::SIMKL_CLIENT_ID secret is not set."
            exit 1
          fi

      - name: Inject public Simkl Client ID
        if: ${{ inputs.build }}
        env:
          SIMKL_CLIENT_ID: ${{ secrets.SIMKL_CLIENT_ID }}
        run: |
          sed -i "s|SIMKL_CLIENT_ID_PLACEHOLDER|${SIMKL_CLIENT_ID}|g" simkl_mps/credentials.py

      - name: Build package
        if: ${{ inputs.build }}
        run: |
          poetry build
          ls -la dist/
        env:
          VERSION: ${{ inputs.version }}

      - name: Upload Python package artifacts
        if: ${{ inputs.build }}
        uses: actions/upload-artifact@v7
        with:
          name: python-package
          path: dist/
          retention-days: 3

      - name: Download previously built package artifacts
        if: ${{ !inputs.build }}
        uses: actions/download-artifact@v8
        with:
          name: python-package
          path: dist/

      - name: Validate publish token
        if: ${{ inputs.publish }}
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$PYPI_API_TOKEN" ]; then
            echo "::error::PYPI_API_TOKEN secret is not set."
            exit 1
          fi

      - name: Publish to PyPI (skip existing)
        if: ${{ inputs.publish }}
        run: poetry publish --skip-existing -vvv
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_API_TOKEN }}
