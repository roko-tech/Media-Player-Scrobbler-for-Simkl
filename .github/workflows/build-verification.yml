name: Build Verification

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      source_sha:
        required: true
        type: string

permissions: 
  contents: read
  id-token: write 

jobs:
  generate-build-info:
    runs-on: ubuntu-latest
    outputs:
      build_info_path: ${{ steps.create-build-info.outputs.build_info_path }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.source_sha }}

      - name: Create build info file
        id: create-build-info
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          BUILD_NUMBER: ${{ github.run_number }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          build_info = {
              "version": os.environ["RELEASE_VERSION"],
              "git_commit": os.environ["SOURCE_SHA"],
              "build_time": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "build_number": os.environ["BUILD_NUMBER"],
              "github_workflow": os.environ["WORKFLOW_NAME"],
              "github_run_id": os.environ["RUN_ID"],
              "github_run_number": os.environ["RUN_NUMBER"],
          }
          Path("build_info.json").write_text(
              json.dumps(build_info, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
          
          echo "build_info_path=build_info.json" >> "$GITHUB_OUTPUT"
          cat build_info.json

      - name: Upload build info as artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-info
          path: build_info.json
