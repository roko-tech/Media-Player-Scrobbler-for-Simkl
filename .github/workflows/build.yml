name: Build and Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.3)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write  

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  

      - name: Determine version
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=${{ github.event.inputs.version }}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"

  build-verification:
    needs: prepare-release
    uses: ./.github/workflows/build-verification.yml
    with:
      version: ${{ needs.prepare-release.outputs.version }}

  build-python-package:
    needs: prepare-release
    uses: ./.github/workflows/publish-pypi.yml
    with:
      version: ${{ needs.prepare-release.outputs.version }}
      build: true
      publish: false
    secrets:
      SIMKL_CLIENT_ID: ${{ secrets.SIMKL_CLIENT_ID }}

  build-windows:
    needs: [prepare-release, build-verification]
    uses: ./.github/workflows/windows-build.yml
    with:
      version: ${{ needs.prepare-release.outputs.version }}
    secrets:
      SIMKL_CLIENT_ID: ${{ secrets.SIMKL_CLIENT_ID }}

  create-github-release:
    needs: [prepare-release, build-python-package, build-windows]
    uses: ./.github/workflows/create-release.yml
    with:
      version: ${{ needs.prepare-release.outputs.version }}
    secrets:
      RELEASE_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    needs: [prepare-release, create-github-release]
    uses: ./.github/workflows/publish-pypi.yml
    with:
      version: ${{ needs.prepare-release.outputs.version }}
      build: false
      publish: true
    secrets:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  publish-github-release:
    needs: [prepare-release, create-github-release, publish-pypi]
    runs-on: ubuntu-latest
    steps:
      - name: Publish fully assembled release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: v${{ needs.prepare-release.outputs.version }}
        run: |
          IS_DRAFT=$(gh release view "$TAG_NAME" --repo "${{ github.repository }}" --json isDraft --jq .isDraft)
          if [ "$IS_DRAFT" != "true" ]; then
            echo "::error::Release $TAG_NAME is not a draft; refusing an ambiguous promotion."
            exit 1
          fi
          gh release edit "$TAG_NAME" --repo "${{ github.repository }}" --draft=false
